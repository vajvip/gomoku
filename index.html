<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Gomoku 五子棋</title>
<style>
  :root {
    --wood-light: #f0c987;
    --wood: #e0b27a;
    --wood-dark: #c9914f;
    --line: #5a4327;
    --panel: #1f2630;
    --panel-2: #2b3441;
    --accent: #ffb454;
    --accent-2: #ff7a45;
    --text: #e8edf3;
    --muted: #9aa6b2;
    --ok: #5ed08a;
    --danger: #ff6b6b;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: radial-gradient(1200px 800px at 50% -10%, #2b3441 0%, #161b22 55%, #0e1217 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;                       /* mobile-correct viewport height */
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
  }

  .app {
    width: 100%;
    max-width: 1040px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 300px;
    gap: 28px;
    align-items: start;
  }

  /* ---------- Mobile (<= 880px) ---------- */
  @media (max-width: 880px) {
    body {
      display: block;                          /* natural document flow, allow scroll */
      padding: 12px 12px 24px;
      align-items: stretch;
      justify-content: stretch;
    }
    .app {
      grid-template-columns: 1fr;
      gap: 14px;
      max-width: 100%;
      margin: 0 auto;
    }
    /* Board must always fit within the visible area — bounded by the smaller of
       viewport width / height so it never overflows on phones. */
    .board-wrap {
      width: 100%;
      max-width: min(100%, calc(100dvh - 220px));
      margin: 0 auto;
      padding: 16px;
    }
  }

  /* ---------- Small phones (<= 380px) ---------- */
  @media (max-width: 380px) {
    body { padding: 8px 8px 20px; }
    .board-wrap { padding: 12px; max-width: min(100%, calc(100dvh - 200px)); }
  }

  /* ---------- Board ---------- */
  .board-wrap {
    background: linear-gradient(145deg, var(--wood-light), var(--wood) 45%, var(--wood-dark));
    border-radius: 14px;
    padding: 26px;
    box-shadow:
      0 18px 50px rgba(0,0,0,.45),
      inset 0 0 0 1px rgba(255,255,255,.18),
      inset 0 0 60px rgba(120, 70, 20, .25);
    position: relative;
    overflow: hidden;
  }
  .board-wrap::before {
    content: "";
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(45deg, rgba(120,70,20,.04) 0 2px, transparent 2px 6px),
      radial-gradient(120% 80% at 0% 0%, rgba(255,255,255,.18), transparent 40%);
    pointer-events: none;
  }

  canvas#board {
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 1 / 1;
    border-radius: 6px;
    touch-action: none;
    cursor: pointer;
    position: relative;
    z-index: 1;
  }

  .board-footer {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #5a4327;
    font-weight: 600;
    font-size: 14px;
    z-index: 1;
    position: relative;
  }
  .board-footer .turn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,.35);
    padding: 6px 12px;
    border-radius: 999px;
    backdrop-filter: blur(2px);
  }
  .turn-dot {
    width: 16px; height: 16px; border-radius: 50%;
    box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  .turn-dot.black { background: radial-gradient(circle at 35% 30%, #6a6a6a, #111 70%); }
  .turn-dot.white { background: radial-gradient(circle at 35% 30%, #fff, #cfcfcf 75%); }

  /* ---------- Side panel ---------- */
  .panel {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 18px 50px rgba(0,0,0,.4);
  }
  .title {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
  }
  .title h1 {
    font-size: 26px;
    margin: 0;
    letter-spacing: 1px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .title small { color: var(--muted); font-size: 13px; }

  .subtitle { color: var(--muted); font-size: 12px; margin: 0 0 18px; }

  .group { margin-bottom: 18px; }
  .group > label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .seg {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .seg.three { grid-template-columns: repeat(3, 1fr); }
  .seg.four { grid-template-columns: 1fr 1fr; }

  .opt {
    appearance: none;
    border: 1px solid rgba(255,255,255,.1);
    background: rgba(255,255,255,.04);
    color: var(--text);
    padding: 9px 8px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s ease;
    text-align: center;
  }
  .opt:hover { border-color: rgba(255,180,84,.5); background: rgba(255,180,84,.08); }
  .opt.active {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-color: transparent;
    color: #2a1c08;
    box-shadow: 0 4px 14px rgba(255,122,69,.35);
  }
  .opt:disabled { opacity: .4; cursor: not-allowed; }

  .switch-row {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    padding: 10px 12px;
    border-radius: 10px;
  }
  .switch-row span { font-size: 13px; }
  .switch-row span small { display:block; color: var(--muted); font-size: 11px; margin-top: 2px;}
  .switch {
    position: relative; width: 42px; height: 24px;
    background: #444c57; border-radius: 999px; cursor: pointer;
    transition: background .2s;
    flex-shrink: 0;
  }
  .switch::after {
    content: ""; position: absolute; top: 3px; left: 3px;
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff; transition: transform .2s;
  }
  .switch.on { background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
  .switch.on::after { transform: translateX(18px); }

  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
  .btn {
    appearance: none; border: none; cursor: pointer;
    padding: 11px; border-radius: 10px; font-weight: 700; font-size: 13px;
    transition: transform .08s ease, filter .15s ease;
  }
  .btn:active { transform: translateY(1px); }
  .btn-ghost {
    background: rgba(255,255,255,.06);
    color: var(--text);
    border: 1px solid rgba(255,255,255,.1);
  }
  .btn-ghost:hover { background: rgba(255,255,255,.12); }
  .btn-primary {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: #2a1c08;
  }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .status {
    margin-top: 18px;
    padding: 12px;
    border-radius: 10px;
    background: rgba(0,0,0,.25);
    border: 1px solid rgba(255,255,255,.06);
    font-size: 13px;
    min-height: 46px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .status .badge {
    font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 999px;
    background: var(--ok); color: #062; text-transform: uppercase; letter-spacing: .5px;
  }
  .status.over .badge { background: var(--accent); color: #2a1c08; }
  .status.forbid .badge { background: var(--danger); color: #4a0606; }
  .status .msg { color: var(--text); }

  /* ---------- Mobile panel compaction ---------- */
  @media (max-width: 880px) {
    .panel { padding: 14px; }
    .title h1 { font-size: 22px; }
    .subtitle { margin-bottom: 12px; }
    .group { margin-bottom: 12px; }
    .group > label { margin-bottom: 6px; }
    .opt { padding: 8px 6px; font-size: 12px; }
    .seg, .actions { gap: 6px; }
    .switch-row { padding: 8px 10px; }
    .switch-row span { font-size: 12px; }
    .switch-row span small { font-size: 10px; }
    .btn { padding: 10px; font-size: 13px; }
    .status { margin-top: 12px; padding: 10px; min-height: 40px; font-size: 12px; }
    .footer-note { margin-top: 10px; }
    .board-footer { margin-top: 10px; font-size: 13px; }
  }

  @media (max-width: 380px) {
    .opt { padding: 7px 4px; font-size: 11px; }
    .title h1 { font-size: 20px; }
  }

  .footer-note { margin-top: 14px; font-size: 11px; color: var(--muted); text-align: center; }
</style>
</head>
<body>
  <div class="app">
    <!-- Board -->
    <div class="board-wrap">
      <canvas id="board" width="600" height="600"></canvas>
      <div class="board-footer">
        <span class="turn" id="turnBadge">
          <span class="turn-dot black" id="turnDot"></span>
          <span id="turnText">Black to move</span>
        </span>
        <span id="moveCount">Move 0</span>
      </div>
    </div>

    <!-- Panel -->
    <aside class="panel">
      <div class="title">
        <h1>Gomoku</h1>
        <small>五子棋</small>
      </div>
      <p class="subtitle">Classic five-in-a-row · 15×15</p>

      <div class="group">
        <label>Game Mode</label>
        <div class="seg" id="modeSeg">
          <button class="opt active" data-mode="pvp">👥 PVP</button>
          <button class="opt" data-mode="pve">🤖 vs AI</button>
        </div>
      </div>

      <div class="group" id="aiGroup" style="display:none">
        <label>AI Difficulty</label>
        <div class="seg three" id="diffSeg">
          <button class="opt" data-diff="1">Easy</button>
          <button class="opt active" data-diff="2">Normal</button>
          <button class="opt" data-diff="3">Hard</button>
        </div>
        <label style="margin-top:12px">AI Plays</label>
        <div class="seg two" id="sideSeg">
          <button class="opt" data-side="white">⚪ White</button>
          <button class="opt active" data-side="black">⚫ Black</button>
        </div>
      </div>

      <div class="group">
        <label>Rules</label>
        <div class="switch-row">
          <span>Forbidden moves <small>Renju restrictions for Black (3-3 / 4-4 / overline)</small></span>
          <div class="switch" id="forbidSwitch"></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-ghost" id="undoBtn">↶ Undo</button>
        <button class="btn btn-primary" id="restartBtn">↻ Restart</button>
      </div>

      <div class="status" id="statusBox">
        <span class="badge" id="statusBadge">Ready</span>
        <span class="msg" id="statusMsg">Place stones to connect five in a row.</span>
      </div>

      <div class="footer-note">Black moves first · Connect 5 to win</div>
    </aside>
  </div>

<script>
"use strict";

/* ============================================================
   Gomoku — single-file implementation
   ============================================================ */

const SIZE = 15;                 // 15x15 board
const EMPTY = 0, BLACK = 1, WHITE = 2;

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

// High-DPI scaling
function fitCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const cssSize = canvas.clientWidth;
  if (cssSize === 0) return;
  canvas.width = Math.round(cssSize * dpr);
  canvas.height = Math.round(cssSize * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

/* ---------- State ---------- */
let board = createBoard();
let history = [];                 // [{x,y,player}]
let currentPlayer = BLACK;
let gameOver = false;
let winLine = null;               // array of [x,y]
let lastMove = null;              // [x,y]
let hoverCell = null;             // [x,y]

let mode = "pvp";                 // pvp | pve
let aiDifficulty = 2;             // 1 easy, 2 normal, 3 hard
let aiSide = BLACK;               // which color the AI controls in PVE
let forbiddenEnabled = false;
let aiThinking = false;

function createBoard() {
  return Array.from({ length: SIZE }, () => new Array(SIZE).fill(EMPTY));
}

/* ---------- Geometry ---------- */
function metrics() {
  const size = canvas.clientWidth || 600;
  const pad = size * 0.045;
  const usable = size - pad * 2;
  const step = usable / (SIZE - 1);
  return { size, pad, step };
}
function cellToPx(x, y) {
  const { pad, step } = metrics();
  return [pad + x * step, pad + y * step];
}
function pxToCell(px, py) {
  const { pad, step } = metrics();
  const x = Math.round((px - pad) / step);
  const y = Math.round((py - pad) / step);
  if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) return null;
  // require click reasonably close to intersection
  const [cx, cy] = cellToPx(x, y);
  if (Math.hypot(px - cx, py - cy) > step * 0.5) return null;
  return [x, y];
}

/* ---------- Drawing ---------- */
const STAR_POINTS = [[3,3],[11,3],[3,11],[11,11],[7,7]];

function draw() {
  const { size, pad, step } = metrics();
  ctx.clearRect(0, 0, size, size);

  // grid lines
  ctx.strokeStyle = "rgba(60,40,20,.85)";
  ctx.lineWidth = Math.max(1, size * 0.0016);
  ctx.lineCap = "round";
  for (let i = 0; i < SIZE; i++) {
    const p = pad + i * step;
    ctx.beginPath(); ctx.moveTo(pad, p); ctx.lineTo(size - pad, p); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p, pad); ctx.lineTo(p, size - pad); ctx.stroke();
  }

  // star points
  ctx.fillStyle = "rgba(60,40,20,.95)";
  const r = Math.max(2.5, step * 0.10);
  for (const [sx, sy] of STAR_POINTS) {
    const [px, py] = cellToPx(sx, sy);
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();
  }

  // stones
  const radius = step * 0.44;
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (board[y][x] !== EMPTY) drawStone(x, y, board[y][x], radius);
    }
  }

  // last move marker
  if (lastMove && !winLine) {
    const [lx, ly] = lastMove;
    const [px, py] = cellToPx(lx, ly);
    ctx.strokeStyle = board[ly][lx] === BLACK ? "#ff7a45" : "#ff7a45";
    ctx.lineWidth = Math.max(1.5, step * 0.06);
    ctx.beginPath(); ctx.arc(px, py, radius * 0.42, 0, Math.PI * 2); ctx.stroke();
  }

  // hover preview
  if (hoverCell && !gameOver && !aiThinking && !isAITurn()) {
    const [hx, hy] = hoverCell;
    if (board[hy][hx] === EMPTY) {
      ctx.globalAlpha = 0.4;
      drawStone(hx, hy, currentPlayer, radius);
      ctx.globalAlpha = 1;
    }
  }

  // winning line highlight
  if (winLine) {
    ctx.strokeStyle = "#ff3b3b";
    ctx.lineWidth = Math.max(3, step * 0.16);
    ctx.lineCap = "round";
    const [a, b] = [winLine[0], winLine[winLine.length - 1]];
    const [ax, ay] = cellToPx(a[0], a[1]);
    const [bx, by] = cellToPx(b[0], b[1]);
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
    // glow dots
    ctx.fillStyle = "rgba(255,80,80,.9)";
    for (const [x, y] of winLine) {
      const [px, py] = cellToPx(x, y);
      ctx.beginPath(); ctx.arc(px, py, radius * 0.30, 0, Math.PI * 2); ctx.fill();
    }
  }
}

function drawStone(x, y, player, radius) {
  const [px, py] = cellToPx(x, y);
  const grad = ctx.createRadialGradient(
    px - radius * 0.35, py - radius * 0.35, radius * 0.1,
    px, py, radius
  );
  if (player === BLACK) {
    grad.addColorStop(0, "#7a7a7a");
    grad.addColorStop(0.4, "#2c2c2c");
    grad.addColorStop(1, "#000");
  } else {
    grad.addColorStop(0, "#ffffff");
    grad.addColorStop(0.6, "#f0f0f0");
    grad.addColorStop(1, "#b8b8b8");
  }
  // shadow
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,.45)";
  ctx.shadowBlur = radius * 0.5;
  ctx.shadowOffsetY = radius * 0.18;
  ctx.beginPath();
  ctx.arc(px, py, radius, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
  // rim
  ctx.lineWidth = Math.max(0.5, radius * 0.05);
  ctx.strokeStyle = player === BLACK ? "rgba(0,0,0,.6)" : "rgba(120,120,120,.5)";
  ctx.beginPath(); ctx.arc(px, py, radius, 0, Math.PI * 2); ctx.stroke();
}

/* ---------- Move logic ---------- */
const DIRS = [[1,0],[0,1],[1,1],[1,-1]];

function inBounds(x, y) { return x >= 0 && x < SIZE && y >= 0 && y < SIZE; }

function lineThrough(x, y, player) {
  // returns array of >=5 in a row containing (x,y), or null
  for (const [dx, dy] of DIRS) {
    const cells = [[x, y]];
    // forward
    let nx = x + dx, ny = y + dy;
    while (inBounds(nx, ny) && board[ny][nx] === player) { cells.push([nx, ny]); nx += dx; ny += dy; }
    // backward
    nx = x - dx; ny = y - dy;
    while (inBounds(nx, ny) && board[ny][nx] === player) { cells.unshift([nx, ny]); nx -= dx; ny -= dy; }
    if (cells.length >= 5) return cells;
  }
  return null;
}

function countDir(x, y, player, dx, dy) {
  let c = 0; let nx = x + dx, ny = y + dy;
  while (inBounds(nx, ny) && board[ny][nx] === player) { c++; nx += dx; ny += dy; }
  return c;
}

/* ----- Renju forbidden-move detection for BLACK -----
   Evaluates on the *temporarily placed* stone. Returns reason string or null. */
function forbiddenReason(x, y) {
  // Only restrict Black
  board[y][x] = BLACK;

  // Overline (6+) is forbidden for black (but exactly 5 is a win, checked elsewhere)
  for (const [dx, dy] of DIRS) {
    const total = 1 + countDir(x, y, BLACK, dx, dy) + countDir(x, y, BLACK, -dx, -dy);
    if (total >= 6) { board[y][x] = EMPTY; return "overline"; }
  }
  // count "open" patterns: open three (exactly) and fours
  let openThrees = 0, fours = 0;
  for (const [dx, dy] of DIRS) {
    if (isFive(x, y, BLACK, dx, dy)) { board[y][x] = EMPTY; return null; } // five wins, allowed
    if (isOpenThree(x, y, BLACK, dx, dy)) openThrees++;
    if (isFour(x, y, BLACK, dx, dy)) fours++;
  }
  board[y][x] = EMPTY;
  if (openThrees >= 2) return "double-three";
  if (fours >= 2) return "double-four";
  return null;
}

function isFive(x, y, player, dx, dy) {
  const total = 1 + countDir(x, y, player, dx, dy) + countDir(x, y, player, -dx, -dy);
  return total === 5; // exactly 5
}
function isFour(x, y, player, dx, dy) {
  // a "four" = placing this stone creates a line that can become exactly-5 next move
  // scan the line span; for each empty spot, simulate and check exact five
  const positions = [];
  for (let k = -4; k <= 4; k++) {
    const nx = x + dx * k, ny = y + dy * k;
    if (inBounds(nx, ny)) positions.push([nx, ny]);
  }
  let found = false;
  for (const [nx, ny] of positions) {
    if (board[ny][nx] === EMPTY) {
      board[ny][nx] = player;
      const t = 1 + countDirThroughEmpty(nx, ny, player, dx, dy);
      // careful: recompute properly using direct neighbor run
      const run = runLength(nx, ny, player, dx, dy);
      board[ny][nx] = EMPTY;
      if (run === 5) { found = true; break; }
    }
  }
  return found;
}
// direct contiguous run through (nx,ny) including it
function runLength(x, y, player, dx, dy) {
  let c = 1;
  let nx = x + dx, ny = y + dy;
  while (inBounds(nx, ny) && board[ny][nx] === player) { c++; nx += dx; ny += dy; }
  nx = x - dx; ny = y - dy;
  while (inBounds(nx, ny) && board[ny][nx] === player) { c++; nx -= dx; ny -= dy; }
  return c;
}
function countDirThroughEmpty() { return 0; } // unused placeholder

function isOpenThree(x, y, player, dx, dy) {
  // placing stone creates a line of 3 with BOTH ends open (and not blocked/overline)
  // Try: is the current line a contiguous 3 with both ends empty?
  // Simpler robust approach: for the current direction, if run==3 and both ends empty -> open three
  const run = runLength(x, y, player, dx, dy);
  if (run !== 3) return false;
  const ahead = nextCellState(x, y, dx, dy);
  const behind = nextCellState(x, y, -dx, -dy);
  return ahead === "empty" && behind === "empty";
}
function nextCellState(x, y, dx, dy) {
  const nx = x + dx, ny = y + dy;
  if (!inBounds(nx, ny)) return "wall";
  if (board[ny][nx] === EMPTY) return "empty";
  if (board[ny][nx] === BLACK) return "black";
  return "white";
}

/* ----- Place a stone ----- */
function tryPlace(x, y, player) {
  if (gameOver) return false;
  if (!inBounds(x, y) || board[y][x] !== EMPTY) return false;

  // Forbidden check (Black only) — but a winning five always overrides
  const fiveLine = (function () {
    board[y][x] = player;
    const ln = lineThrough(x, y, player);
    board[y][x] = EMPTY;
    return ln;
  })();
  if (!fiveLine && forbiddenEnabled && player === BLACK) {
    const reason = forbiddenReason(x, y);
    if (reason) {
      flashForbidden(reason);
      return false;
    }
  }

  board[y][x] = player;
  history.push({ x, y, player });
  lastMove = [x, y];

  const win = lineThrough(x, y, player);
  if (win) {
    winLine = win;
    gameOver = true;
    setStatus(true, "win", `${player === BLACK ? "Black" : "White"} wins! 🎉`);
  } else {
    currentPlayer = player === BLACK ? WHITE : BLACK;
    setStatus(false, "info", "");
  }
  updateUI();
  draw();
  return true;
}

function flashForbidden(reason) {
  const map = {
    "overline": "Forbidden: overline (6+)",
    "double-three": "Forbidden: double-three (3-3)",
    "double-four": "Forbidden: double-four (4-4)"
  };
  const box = document.getElementById("statusBox");
  box.classList.add("forbid");
  document.getElementById("statusBadge").textContent = "Forbidden";
  document.getElementById("statusMsg").textContent = map[reason] || "Illegal move";
  setTimeout(() => {
    box.classList.remove("forbid");
    updateUI();
  }, 1400);
}

/* ---------- AI ---------- */
function isAITurn() { return mode === "pve" && currentPlayer === aiSide && !gameOver; }

// Pattern scores for heuristic evaluation
function evaluatePoint(boardArr, x, y, player) {
  const opp = player === BLACK ? WHITE : BLACK;
  return scoreFor(boardArr, x, y, player) + scoreFor(boardArr, x, y, opp) * 0.9;
}

function scoreFor(b, x, y, player) {
  // score the gain of having `player` at (x,y) by scanning 4 directions
  let total = 0;
  for (const [dx, dy] of DIRS) {
    total += dirScore(b, x, y, player, dx, dy);
  }
  return total;
}

function dirScore(b, x, y, player, dx, dy) {
  // gather line of 9 cells centered on (x,y): -4..+4
  let line = "";
  for (let k = -4; k <= 4; k++) {
    const nx = x + dx * k, ny = y + dy * k;
    if (!inBounds(nx, ny)) line += "2";        // wall
    else if (b[ny][nx] === player) line += "1";
    else if (b[ny][nx] === EMPTY) line += "0";
    else line += "2";                          // opponent blocks like wall
  }
  return patternScore(line);
}

const PATTERNS = [
  [/11111/, 1000000],     // five
  [/011110/, 100000],     // open four
  [/011112|211110/, 10000],   // four (simple)  -> half-open four / four
  [/11011|11101|10111/, 10000], // broken four
  [/01110/, 5000],        // open three
  [/010110|011010/, 5000],// split three
  [/011010|010110/, 5000],
  [/001112|211100/, 500], // half-open three
  [/01100|00110/, 500],   // two-ish
  [/00100/, 50],
];

function patternScore(line) {
  let s = 0;
  for (const [re, val] of PATTERNS) {
    const m = line.match(re);
    if (m) s += val;
  }
  return s;
}

function candidateMoves(b) {
  const seen = new Set();
  const list = [];
  let anyStone = false;
  for (let y = 0; y < SIZE; y++)
    for (let x = 0; x < SIZE; x++)
      if (b[y][x] !== EMPTY) anyStone = true;
  if (!anyStone) return [[7, 7]];

  const R = 2;
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (b[y][x] === EMPTY) continue;
      for (let dy = -R; dy <= R; dy++) {
        for (let dx = -R; dx <= R; dx++) {
          const nx = x + dx, ny = y + dy;
          if (!inBounds(nx, ny) || b[ny][nx] !== EMPTY) continue;
          const key = nx * SIZE + ny;
          if (seen.has(key)) continue;
          seen.add(key);
          list.push([nx, ny]);
        }
      }
    }
  }
  return list;
}

function aiMove() {
  const me = aiSide;
  const opp = me === BLACK ? WHITE : BLACK;
  const cands = candidateMoves(board);

  // Depth & search strategy by difficulty
  let bestMove = cands[0];

  if (aiDifficulty === 1) {
    // Easy: greedily pick best heuristic, with some randomness for non-critical
    let scored = cands.map(([x, y]) => ({ x, y, s: evaluatePoint(board, x, y, me) }));
    scored.sort((a, b) => b.s - a.s);
    // take from top 3 randomly for variety when scores are low
    const top = scored.filter(s => s.s >= scored[0].s * 0.9 || s.s > 100000);
    const pool = top.length ? top : scored.slice(0, 3);
    const pick = pool[Math.floor(Math.random() * pool.length)];
    bestMove = [pick.x, pick.y];
  } else {
    // Normal: 1-ply greedy with offensive+defensive weighting
    // Hard: shallow minimax (depth 2) on top candidates
    const scored = cands.map(([x, y]) => ({ x, y, s: evaluatePoint(board, x, y, me) }));
    scored.sort((a, b) => b.s - a.s);
    const top = scored.slice(0, aiDifficulty === 3 ? 10 : 6);

    if (aiDifficulty === 3) {
      // minimax depth 2 (me then opp) over top candidates
      let bestVal = -Infinity;
      for (const c of top) {
        board[c.y][c.x] = me;
        // if this is an immediate win, take it
        if (lineThrough(c.x, c.y, me)) {
          board[c.y][c.x] = EMPTY;
          bestMove = [c.x, c.y]; break;
        }
        const val = minimax(board, 1, false, me, opp, -Infinity, Infinity);
        board[c.y][c.x] = EMPTY;
        if (val > bestVal) { bestVal = val; bestMove = [c.x, c.y]; }
      }
    } else {
      bestMove = [top[0].x, top[0].y];
      // defensive override: if opponent has an open four, must block
      const threat = findImmediateThreat(board, opp);
      if (threat) bestMove = threat;
    }
  }
  return bestMove;
}

function findImmediateThreat(b, player) {
  // returns a cell that blocks opponent's forced win (open four / four)
  const cands = candidateMoves(b);
  let best = null, bestS = 0;
  for (const [x, y] of cands) {
    b[y][x] = player;
    const win = lineThrough(x, y, player);
    b[y][x] = EMPTY;
    if (win) {
      // opponent would win here → we must block this cell
      return [x, y];
    }
  }
  // also detect opponent open-four we should block (best defensive cell)
  for (const [x, y] of cands) {
    const s = scoreFor2D(b, x, y, player);
    if (s > bestS) { bestS = s; best = [x, y]; }
  }
  return bestS >= 10000 ? best : null;
}
function scoreFor2D(b, x, y, player) {
  let total = 0;
  for (const [dx, dy] of DIRS) total += dirScore(b, x, y, player, dx, dy);
  return total;
}

function minimax(b, depth, maximizing, me, opp, alpha, beta) {
  if (depth === 0) {
    // evaluate from AI perspective
    return boardEvaluate(b, me) - boardEvaluate(b, opp);
  }
  const cands = candidateMoves(b).slice(0, 8);
  if (maximizing) {
    let val = -Infinity;
    for (const [x, y] of cands) {
      b[y][x] = me;
      if (lineThrough(x, y, me)) { b[y][x] = EMPTY; return 1000000; }
      val = Math.max(val, minimax(b, depth - 1, false, me, opp, alpha, beta));
      b[y][x] = EMPTY;
      alpha = Math.max(alpha, val);
      if (beta <= alpha) break;
    }
    return val;
  } else {
    let val = Infinity;
    for (const [x, y] of cands) {
      b[y][x] = opp;
      if (lineThrough(x, y, opp)) { b[y][x] = EMPTY; return -1000000; }
      val = Math.min(val, minimax(b, depth - 1, true, me, opp, alpha, beta));
      b[y][x] = EMPTY;
      beta = Math.min(beta, val);
      if (beta <= alpha) break;
    }
    return val;
  }
}

function boardEvaluate(b, player) {
  // sum of best pattern per occupied stone — quick heuristic
  let total = 0;
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (b[y][x] === player) total += scoreFor2D(b, x, y, player);
    }
  }
  return total / 4; // each stone counted ~4 dirs
}

function maybeAIMove() {
  if (!isAITurn() || gameOver) return;
  aiThinking = true;
  setStatus(false, "info", "AI is thinking…");
  updateUI(); draw();
  // defer so UI can paint
  setTimeout(() => {
    const move = aiMove();
    aiThinking = false;
    if (move) tryPlace(move[0], move[1], aiSide);
    if (isAITurn() && !gameOver) maybeAIMove();
  }, 120);
}

/* ---------- UI wiring ---------- */
function updateUI() {
  const dot = document.getElementById("turnDot");
  const txt = document.getElementById("turnText");
  dot.className = "turn-dot " + (currentPlayer === BLACK ? "black" : "white");
  if (gameOver) {
    txt.textContent = winLine ? "Game over" : "Game over";
  } else if (aiThinking) {
    txt.textContent = "AI thinking…";
  } else {
    txt.textContent = (currentPlayer === BLACK ? "Black" : "White") + " to move";
  }
  document.getElementById("moveCount").textContent = "Move " + history.length;

  // status defaults
  if (!gameOver && !aiThinking) {
    setStatus(false, "info",
      mode === "pve"
        ? (isAITurn() ? "AI's turn." : "Your turn.")
        : `${currentPlayer === BLACK ? "Black" : "White"}'s turn.`);
  }
  document.getElementById("undoBtn").disabled = history.length === 0 || aiThinking;
}

function setStatus(over, kind, msg) {
  const box = document.getElementById("statusBox");
  box.classList.remove("forbid");
  if (over) box.classList.add("over"); else box.classList.remove("over");
  const badge = document.getElementById("statusBadge");
  badge.textContent =
    kind === "win" ? "Win" :
    kind === "forbid" ? "Forbidden" :
    aiThinking ? "AI" : "Playing";
  document.getElementById("statusMsg").textContent = msg;
}

/* ----- Events ----- */
function pointerToCell(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left);
  const cy = (e.clientY - rect.top);
  return pxToCell(cx, cy);
}

canvas.addEventListener("mousemove", (e) => {
  if (gameOver || aiThinking || isAITurn()) { hoverCell = null; draw(); return; }
  const c = pointerToCell(e);
  const prev = hoverCell;
  hoverCell = c;
  if (JSON.stringify(prev) !== JSON.stringify(c)) draw();
});
canvas.addEventListener("mouseleave", () => { hoverCell = null; draw(); });

canvas.addEventListener("click", (e) => {
  if (gameOver || aiThinking) return;
  if (isAITurn()) return;
  const c = pointerToCell(e);
  if (!c) return;
  const [x, y] = c;
  const placed = tryPlace(x, y, currentPlayer);
  if (placed) maybeAIMove();
});

// Touch
canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  if (gameOver || aiThinking || isAITurn()) return;
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const c = pxToCell(t.clientX - rect.left, t.clientY - rect.top);
  if (!c) return;
  const placed = tryPlace(c[0], c[1], currentPlayer);
  if (placed) maybeAIMove();
}, { passive: false });

/* ----- Controls ----- */
document.getElementById("modeSeg").addEventListener("click", (e) => {
  const btn = e.target.closest(".opt"); if (!btn) return;
  restart();
  mode = btn.dataset.mode;
  [...e.currentTarget.children].forEach(b => b.classList.toggle("active", b === btn));
  document.getElementById("aiGroup").style.display = mode === "pve" ? "" : "none";
  updateUI();
  if (mode === "pve") maybeAIMove();
});

document.getElementById("diffSeg").addEventListener("click", (e) => {
  const btn = e.target.closest(".opt"); if (!btn) return;
  aiDifficulty = parseInt(btn.dataset.diff, 10);
  [...e.currentTarget.children].forEach(b => b.classList.toggle("active", b === btn));
});

document.getElementById("sideSeg").addEventListener("click", (e) => {
  const btn = e.target.closest(".opt"); if (!btn) return;
  aiSide = btn.dataset.side === "black" ? BLACK : WHITE;
  [...e.currentTarget.children].forEach(b => b.classList.toggle("active", b === btn));
  restart();
  if (mode === "pve") maybeAIMove();
});

const forbidSwitch = document.getElementById("forbidSwitch");
forbidSwitch.addEventListener("click", () => {
  forbiddenEnabled = !forbiddenEnabled;
  forbidSwitch.classList.toggle("on", forbiddenEnabled);
});

document.getElementById("undoBtn").addEventListener("click", undo);
document.getElementById("restartBtn").addEventListener("click", () => { restart(); if (mode === "pve") maybeAIMove(); });

function undo() {
  if (history.length === 0 || aiThinking) return;
  // In PVE undo two plies (player + AI) when possible
  const steps = (mode === "pve" && history.length >= 2) ? 2 : 1;
  for (let i = 0; i < steps && history.length > 0; i++) {
    const last = history.pop();
    board[last.y][last.x] = EMPTY;
  }
  const last = history[history.length - 1];
  lastMove = last ? [last.x, last.y] : null;
  currentPlayer = (history.length % 2 === 0) ? BLACK : WHITE;
  gameOver = false; winLine = null;
  updateUI(); draw();
}

function restart() {
  board = createBoard();
  history = [];
  currentPlayer = BLACK;
  gameOver = false;
  winLine = null;
  lastMove = null;
  hoverCell = null;
  aiThinking = false;
  setStatus(false, "info", "New game. Black moves first.");
  updateUI(); draw();
}

/* ---------- Init ---------- */
window.addEventListener("resize", fitCanvas);
new ResizeObserver(fitCanvas).observe(canvas);
fitCanvas();
updateUI();
</script>
